version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - nolintlint
    - gosec

  settings:
    nolintlint:
      allow-unused: false
      require-specific: true

  exclusions:
    rules:
      - linters: [errcheck]
        text: "fmt\\.(Fprintf|Fprintln|Fprint)"
      - path: _test\.go
        linters: [errcheck]
        text: 'Error return value of .*(Chmod|Remove).* is not checked'
      # G204: exec.Command with variable args in tests is not untrusted input.
      - linters: [gosec]
        text: "G204:"
      # G404: game randomness doesn't require crypto-strength RNG.
      - linters: [gosec]
        text: "G404:"
      # Test files: permission values in temp dirs and unhandled test writes are not a security concern.
      - path: _test\.go
        linters: [gosec]
        text: "(G104|G301|G302|G306):"
